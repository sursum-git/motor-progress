<!DOCTYPE html>
<html lang="en">
<head>
    <title>Export Chat History</title>
    <meta charset="utf-8">
    <link href="../content/shared/styles/examples-offline.css" rel="stylesheet">
    <link href="../../styles/default-ocean-blue.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://unpkg.com/jszip/dist/jszip.min.js"></script>
    <script src="../../js/kendo.all.min.js"></script>
    <script src="../content/shared/js/console.js"></script>
    
    
</head>
<body>
    <a class="offline-button" href="../index.html">Back</a>

    

<div id="container" class="k-d-flex k-justify-content-center">
    <span id="notification"></span>
    <div id="chat"></div>
</div>
<script>
    const currentUser = {
        id: 1,
        name: "John Doe",
        iconUrl: "https://demos.telerik.com/kendo-ui/content/web/Customers/RICSU.jpg",
        iconAltText: "John's profile picture"
    };

    var notificationWidget = $("#notification").kendoNotification({
        width: 300,
        height: 54,
        appendTo: "#container"
    }).data("kendoNotification");

    var chat = $("#chat").kendoChat({
        fileAttachment: { restrictions: { allowedExtensions: ['.jpg', '.pdf'] } },
        suggestedActionsScrollable: true,
        suggestionsScrollable: true,
        messageWidthMode: "standard",
        height: 600,
        headerItems: [{
            type: "contentItem",
            template: () => "<strong>Careers portal chat</strong>"
        }, {
            type: "spacer"
        }, {
            type: "contentItem",
            template: () => "<button id='export-history'></button>"
        }],
        fileActions: [{
            name: "download",
            text: "Download",
            icon: "download"
        }, {
            name: "delete",
            text: "Delete",
            icon: "trash"
        }],
        fileMenuAction: function(e) {
            notificationWidget.show("File menu action selected: " + e.type, "info" );
        },
        suggestions: [
            { text: "Learn more about the company" },
            { text: "Get tips on preparing for the interview" },
            { text: "Subscribe for the job update" },
            { text: "No need for further assistance" }
        ],
        authorId: 1,
        dataSource: {
            data: [
                {
                    id: 2,
                    authorId: 2,
                    authorName: "Peter Smith",
                    authorImageUrl: "https://demos.telerik.com/kendo-ui/content/web/Customers/GOURL.jpg",
                    authorImageAltText: "Peter's profile picture",
                    text: "Hi there! Welcome to our Careers Portal. I see you're interested in the Designer position. Could you please upload your application documents (CV, portfolio and cover letter) so we can get started?",
                    timestamp: new Date(),
                },
            ]
        },
        sendMessage: function(e) {
            e.message.authorId = currentUser.id;
            e.message.authorName = currentUser.name;
            e.message.authorImageUrl = currentUser.iconUrl;
            e.message.authorImageAltText = currentUser.iconAltText;
            let text = '';
            let secondText = "Is there something else I could assist you with?";
            let file = {};
            if (e.message.files.length > 0) {
                setTimeout(function() {
                    e.sender.postMessage({
                        authorId: 2,
                        authorName: "Peter Smith",
                        authorImageUrl: "https://demos.telerik.com/kendo-ui/content/web/Customers/GOURL.jpg",
                        authorImageAltText: "Peter's profile picture",
                        text: "Great! Your application has been successfully submitted. Our hiring team will review your files and get back to you within 5-7 business days. In the meantime, let me know what else would you like.",
                        timestamp: new Date()
                    });
                }, 500)
            } else {
                if (e.message.text.toLowerCase().trim() === 'learn more about the company') {
                    text = "Thank you for your interest! To learn more about our company and the services we offer, please visit the following links: https://www.youtube.com/watch?v=VX919tM3Zck https://www.progress.com/company";
                } else if (e.message.text.toLowerCase().trim() === 'get tips on preparing for the interview') {
                    text = "Here is a short presentation with some useful tips and tricks to help you shine in your designer job interview.";
                    file = {
                        name: "Interview_Guidelines.pdf",
                        size: 5315153,
                        extension: "pdf",
                        url: "https://demos.telerik.com/kendo-ui/content/web/pdfViewer/sample.pdf"
                    };
                } else if (e.message.text.toLowerCase().trim() === 'subscribe for the job update') {
                    text = "To subscribe for job update, you must send me your email. Alternatively, you could: \n" +
                        "1. Visit the company’s Careers Page at www.company.com/carreers_page. \n" +
                        "2. Look for a “Subscribe” or “Stay Updated” section. \n" +
                        "3. Enter your email address to receive alerts about new job openings.";
                } else if (e.message.text.toLowerCase().trim() === 'no need for further assistance') {
                    text = "Understood. Good luck with your application. I'm here if you need anything else in the future.";
                    secondText = '';
                } else {
                    text = "Please select a quick reply.";
                    secondText = '';
                }
                setTimeout(function() {
                    const messages = [];
                    messages.push({
                        authorId: 2,
                        authorName: "Peter Smith",
                        authorImageUrl: "https://demos.telerik.com/kendo-ui/content/web/Customers/GOURL.jpg",
                        authorImageAltText: "Peter's profile picture",
                        text: text,
                        timestamp: new Date()
                    });

                    if (file.hasOwnProperty('name')) {
                        messages.push({
                            authorId: 2,
                            authorName: "Peter Smith",
                            authorImageUrl: "https://demos.telerik.com/kendo-ui/content/web/Customers/GOURL.jpg",
                            authorImageAltText: "Peter's profile picture",
                            timestamp: new Date(),
                            files: [file]
                        });
                    }
                    // Push second text message if exists
                    if (secondText != '') {
                        messages.push({
                            authorId: 2,
                            authorName: "Peter Smith",
                            authorImageUrl: "https://demos.telerik.com/kendo-ui/content/web/Customers/GOURL.jpg",
                            authorImageAltText: "Peter's profile picture",
                            text: secondText,
                            timestamp: new Date()
                        });
                    }
                    sendMessagesSequentially(e.sender, messages);
                }, 200)
            }
        }
    }).data("kendoChat");

    function delay(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function sendMessagesSequentially(sender, messages) {
        for (const msg of messages) {
            sender.postMessage(msg);
            await delay(300);
        }
    }

    $('#export-history').kendoDropDownButton({
        fillMode: "flat",
        icon: 'more-vertical',
        items: [
            {
                name: 'download',
                text: 'Download conversation',
                icon: 'download',
                click: function(e){
                    let chat = $("#chat").data("kendoChat");
                    let messages = chat.dataSource.view();
                    const formattedMessages = messages
                        .map((msg) => {
                            let messageText = `${msg.authorName}: ${msg.text}`;
                            if (msg.files && msg.files.length > 0) {
                                const fileNames = msg.files.map((file) => file.name).join(', ');
                                messageText += `\n[Note: This message contains file(s): ${fileNames}]`;
                            }
                            return messageText;
                        })
                        .join('\n');
                    const blob = new Blob([formattedMessages], { type: 'text/plain' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'conversation.txt';
                    a.style.display = 'none';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    notificationWidget.show("Conversation downloaded", "info");
                }
            },
            {
                name: 'clear',
                text: 'Clear conversation',
                icon: 'trash',
                click: function() {
                    let chat = $("#chat").data("kendoChat");
                    chat.clearMessages();
                }
            }
        ]
    });
</script>

<style>
        .k-chat-bubble-text{
            overflow-wrap: break-word !important;
            word-break: normal !important;
        }

        .k-notification {
            position: absolute;
            z-index: 9999;
            top: 82%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .k-chat{
            max-width: 400px;
        }
</style>
</body>
</html>
