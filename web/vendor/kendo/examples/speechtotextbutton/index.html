<!DOCTYPE html>
<html lang="en">
<head>
    <title>Overview</title>
    <meta charset="utf-8">
    <link href="../content/shared/styles/examples-offline.css" rel="stylesheet">
    <link href="../../styles/default-ocean-blue.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://unpkg.com/jszip/dist/jszip.min.js"></script>
    <script src="../../js/kendo.all.min.js"></script>
    <script src="../content/shared/js/console.js"></script>
    
    
</head>
<body>
    <a class="offline-button" href="../index.html">Back</a>

    
<div class="demo-wrapper k-d-grid k-gap-8 k-flex-1 k-px-8 k-pt-7">
    <div data-role="skeletoncontainer" class="side-container k-skeleton k-opacity-20 !k-d-flex k-flex-col k-align-items-center k-px-5 k-pt-7.5 k-rounded-tl-md k-rounded-tr-md" aria-live="polite" aria-label="Loading...">

        <div class="k-d-flex k-flex-col k-align-items-center k-gap-1">
            <span class="k-skeleton k-w-24 k-h-4 k-rounded-md"></span>
            <span class="k-skeleton k-opacity-80 k-w-14 k-h-2.5 k-rounded-md"></span>
        </div>

        <div class="k-d-flex k-flex-col k-w-full k-mt-13 k-gap-4">
            <div class="k-skeleton k-opacity-80 k-rounded-md k-h-2.5"></div>
            <div class="k-skeleton k-opacity-80 k-rounded-md k-h-2.5"></div>
            <div class="k-skeleton k-opacity-80 k-rounded-md k-h-2.5"></div>
        </div>

    </div>

    <div class="main-container k-pb-8 k-d-flex k-flex-col">
        <div class="kd-m-b k-d-flex k-gap-3 k-align-items-center">
            <h4 class="k-h4 k-opacity-20 k-font-bold">Additional Information</h4>
        </div>

        <div class="k-d-flex k-flex-col k-gap-1 k-mb-5">
            <span class="k-skeleton k-opacity-40 k-rounded-md k-w-24 k-px-3 k-h-4"></span>
            <span class="k-skeleton k-opacity-30 k-rounded-md k-h-7.5"></span>
        </div>

        <div>Project Impact Summary</div>
        <textarea id="textarea" rows="16">
        </textarea>

        <div class="k-d-flex k-flex-col k-gap-1 k-mt-5">
            <span class="k-skeleton k-opacity-40 k-rounded-md k-w-24 k-px-3 k-h-4"></span>
        </div>
    </div>
</div>

<script>
    let textArea = $("#textarea").kendoTextArea({
        rows: 3,
        rounded: "large",
        size: "large",
        value: "Describe a project you worked on that had a strong impact.",
        suffixOptions: {
            template: () => `<div class="description k-ml-xs">Click the mic to speak</div> <button id="speechButton" class="k-mr-xs"></button>`
        }
    }).data("kendoTextArea");

    $("#speechButton").kendoSpeechToTextButton({
        fillMode: "flat",
        start: onStart,
        end: onEnd,
        result: onResult
    });

    function onStart() {
        $(".description").text("Listening...");
    }

    function onEnd() {
        $(".description").text("Click the mic to speak");
    }

    function onResult(e) {
        let transcript = e.alternatives[0].transcript;
        $("#textarea").data("kendoTextArea").value(`${transcript}`);
    }
</script>

<style>
      .demo-wrapper {
        grid-template-columns: 180px 1fr;
    }

    .k-input-suffix {
        display: flex;
        justify-content: space-between;
        padding: 0.5rem;
    }

    .k-h4 {
        line-height: 26px;
        margin-bottom: 0;
    }

    .kd-m-b {
        margin-bottom: 17px;
    }

    /* Breakpoints for full screen demo: max:599px, min:759px and max: 959 */
    @media (max-width: 678px), (min-width: 821px) and (max-width: 1038px), (min-width: 1241px) and (max-width: 1328px) {
      .demo-wrapper {
        grid-template-columns: 1fr;
      }

      .side-container {
        display: none !important;
      }

      .main-container {
        padding-bottom: 0;
      }

    }
</style>

</body>
</html>
