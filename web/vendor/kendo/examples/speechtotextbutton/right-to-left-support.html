<!DOCTYPE html>
<html lang="en">
<head>
    <title>RTL Support</title>
    <meta charset="utf-8">
    <link href="../content/shared/styles/examples-offline.css" rel="stylesheet">
    <link href="../../styles/default-ocean-blue.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://unpkg.com/jszip/dist/jszip.min.js"></script>
    <script src="../../js/kendo.all.min.js"></script>
    <script src="../content/shared/js/console.js"></script>
    
    
</head>
<body>
    <a class="offline-button" href="../index.html">Back</a>

    

<div id="example">

    <div class="demo-section k-rtl">
        <h4>Basic SpeechToTextButton </h4>
        <p>
            <button type="button" id="textButton"></button>
        </p>

        <h4>Disabled SpeechToTextButton </h4>
        <p>
            <span id="disabledButton">Disabled</span>
        </p>
    </div>

    <script>
        $(document).ready(function() {
            $("#textButton").kendoSpeechToTextButton();

            $("#disabledButton").kendoSpeechToTextButton({
                enable: false
            });
        });
    </script>

    <style>
        .demo-section p {
            margin: 0 0 30px;
            line-height: 4em;
        }
    </style>
</div>
</body>
</html>
