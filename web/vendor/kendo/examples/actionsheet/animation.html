<!DOCTYPE html>
<html lang="en">
<head>
    <title>Animation</title>
    <meta charset="utf-8">
    <link href="../content/shared/styles/examples-offline.css" rel="stylesheet">
    <link href="../../styles/default-ocean-blue.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://unpkg.com/jszip/dist/jszip.min.js"></script>
    <script src="../../js/kendo.all.min.js"></script>
    <script src="../content/shared/js/console.js"></script>
    
    
</head>
<body>
    <a class="offline-button" href="../index.html">Back</a>

    
<div class="configurator">
        <div class="header">Configurator</div>
        <div class="box-col">
            <h4>Animation Settings</h4>
            <ul class="options">
                <li>
                    <input id="toggle" name="animation" type="radio" /> <label for="toggle">toggle animation</label>
                </li>
                <li>
                    <input id="slide" name="animation" type="radio" checked="checked" /> <label for="slide">slide animation</label>
                </li>
                <li>
                    <input id="expand" name="animation" type="radio" checked="checked" /> <label for="expand">expand animation</label>
                </li>
                <li>
                    <input id="opacity" type="checkbox" checked="checked" /> <label for="opacity">animate opacity</label>
                </li>
            </ul>
        </div>
        <div class="box-col">
            <h4>Duration</h4>
            <ul class="options">
                <li>
                    <input id="duration" value="1500" />
                </li>
                <li>
                    <button id="apply">Apply</button>
                </li>
            </ul>
        </div>
    </div>


<div class="demo-section wide">
  <div class="demo-app" style="position: relative">
    <div id="city" class="demo-view" style="position: absolute">
      <div class="cards-container">
        <div class="k-card">
          <div class="k-card-header">
            <h5 class="k-card-title">San Francisco</h5>
            <h6 class="k-card-subtitle">City in California</h6>
          </div>
          <img
            alt="Kendo UI for jQuery ActionSheet Golden Gate Bridge and the strait"
            class="k-card-media"
            src="../content/web/cards/sanfran.jpg"
          />
          <div class="k-card-body">
            <p>
              San Francisco, officially City and County of San Francisco and
              colloquially known as SF, San Fran or "The City", is the cultural,
              commercial, and financial center of Northern California.
            </p>
          </div>
        </div>
      </div>
      <button id="openActionSheetBttn">OPEN ACTION SHEET</button>
      <div id="actionsheet"></div>
    </div>
  </div>
</div>
<script>
  $(document).ready(function () {
    var actionsheet = $("#actionsheet")
      .kendoActionSheet({
        title: "Select item",
        actionButtonsOrientation: "horizontal",
        actionButtonsAlignment: "start",
        adaptive: true,
        animation: {
              open: {
                  effects: "expand:vertical",
                  duration: 1500
              },
              close: {
                  effects: "expand:vertical",
                  duration: 1500
              }
          },
        startButton: {
            icon: "chevron-left",
            click: function(e) {
                kendo.alert("Start button clicked");
            }
        },
        closeButton: {
            icon: "chevron-right",
            click: function(e) {
                kendo.alert("End button clicked");
            }
        },
        items: [
          {
            text: "Edit Item",
            iconClass: "k-i-pencil",
            click: onClick,
          },
          {
            text: "Add to Favorites",
            iconClass: "k-i-heart",
            click: onClick,
          },
        ],
        actionButtons: [
          {
            icon: "check",
            fillMode: "solid",
            themeColor: "primary",
            rounded: "full",
            size: "large",
            text: "Confirm",
          },
          {
            icon: "cancel",
            fillMode: "outline",
            themeColor: "info",
            rounded: "full",
            size: "large",
            text: "Cancel",
          },
        ],
      })
      .data("kendoActionSheet");


    $("#openActionSheetBttn").kendoButton({
      themeColor: "primary",
      click: function () {
        actionsheet.open();
      },
    });

    function onClick(e) {
      e.preventDefault();
      actionsheet.close();
    }

    var getEffects = function () {
                return (($("#expand")[0].checked ? "expand:vertical " : "") +
                    ($("#slide")[0].checked ? "slideIn:left " : "") +
                    ($("#opacity")[0].checked ? "fadeIn" : "")) || false;
            };

     $("#duration").kendoNumericTextBox({
        value: 1500
    });

    $("#apply").kendoButton({
        click: function() {
            var animation = getEffects();
            debugger
            var duration = $("#duration").data("kendoNumericTextBox").value();

            actionsheet.setOptions({
                animation: {
                    open: {
                        effects: animation,
                        duration: duration
                    },
                    close: {
                        effects: animation,
                        duration: duration
                    }
                }
            });
        }
    });

  });
</script>

<style>
     .demo-view {
            transform: scale(1);
            overflow: hidden;
        }

        .k-actionsheet-container {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .k-actionsheet-container > .k-overlay {
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        .cards-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 35px;
        }

        .k-card {
            width: 285px;
            margin: 5%;
        }

        #openActionSheetBttn {
            margin: 0 auto;
            display: block;
        }

        .demo-app {
            margin: auto;
            width: 380px;
            height: 600px;
            background: #FFFFFF;
            box-shadow: 0px 10px 20px #00000016;
            border-radius: 30px;
            font-family: 'Roboto', sans-serif;
            font-size: 14px;
        }

        #city {
            background: #F9F9F9;
            height: inherit;
            width: inherit;
            border-radius: 30px;
            border: 10px solid white;
            box-sizing: border-box;
        }

        .demo-app h3 {
            padding-top: 24px;
            text-align: center;
            font-size: 28px;
            letter-spacing: 0.28px;
            color: #3D57D8;
            font-weight: 400;
        }

        .k-picker.k-dropdownlist {
		    width: 140px;
	    }

        .note {
            font: normal 18px "Metric";
            border-radius: 2px;
            margin: 20px auto 40px auto;
            padding: 20px;
            border-left: 4px solid;
            border-left-color: #5392e4;
            background: rgba(83,146,228,0.1);
            text-align: center;
        }
</style>

</body>
</html>
