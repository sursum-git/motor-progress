<!DOCTYPE html>
<html lang="en">
<head>
    <title>Events</title>
    <meta charset="utf-8">
    <link href="../content/shared/styles/examples-offline.css" rel="stylesheet">
    <link href="../../styles/default-ocean-blue.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://unpkg.com/jszip/dist/jszip.min.js"></script>
    <script src="../../js/kendo.all.min.js"></script>
    <script src="../content/shared/js/console.js"></script>
    
    
</head>
<body>
    <a class="offline-button" href="../index.html">Back</a>

    
<div class="k-d-flex k-justify-content-center" style="padding-top: 54px">
    <div class="promptbox-container">
        <input id="promptbox" />
    </div>
</div>

<script>
    $(document).ready(function () {
        function onFocus(e) {
            kendoConsole.log("Focus :: PromptBox received focus");
        }

        function onBlur(e) {
            kendoConsole.log("Blur :: PromptBox lost focus");
        }

        function onInput(e) {
            kendoConsole.log("Input :: " + e.value);
        }

        function onValueChange(e) {
            kendoConsole.log("ValueChange :: " + e.newValue);
        }

        function onMultilineStateChange(e) {
            kendoConsole.log("MultilineStateChange :: isMultiline = " + e.isMultiline);
        }

        function onPromptAction(e) {
            kendoConsole.log("PromptAction :: actionType = " + e.actionType + ", value = " + e.value);
        }

        function onFileSelect(e) {
            var fileNames = e.files.map(function(f) { return f.name; }).join(", ");
            kendoConsole.log("SelectAttachments :: " + fileNames);
        }

        function onFileRemove(e) {
            kendoConsole.log("RemoveAttachment :: " + e.file.name);
        }

        $("#promptbox").kendoPromptBox({
            placeholder: "Type a message...",
            mode: "auto",
            fileSelectButton: true,
            focus: onFocus,
            blur: onBlur,
            input: onInput,
            valueChange: onValueChange,
            multilineStateChange: onMultilineStateChange,
            promptAction: onPromptAction,
            fileSelect: onFileSelect,
            fileRemove: onFileRemove
        });
    });
</script>

<style>
    .promptbox-container {
        padding-bottom: 40px;
        padding-top: 160px;
        padding-left: 35px;
        padding-right: 35px;
        width: 540px;
        min-height: 244px;
        box-shadow: 0 0 12px 4px rgba(0, 0, 0, 0.08);
    }
</style>
</body>
</html>
