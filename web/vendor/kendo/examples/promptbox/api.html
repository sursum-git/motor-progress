<!DOCTYPE html>
<html lang="en">
<head>
    <title>API</title>
    <meta charset="utf-8">
    <link href="../content/shared/styles/examples-offline.css" rel="stylesheet">
    <link href="../../styles/default-ocean-blue.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://unpkg.com/jszip/dist/jszip.min.js"></script>
    <script src="../../js/kendo.all.min.js"></script>
    <script src="../content/shared/js/console.js"></script>
    
    
</head>
<body>
    <a class="offline-button" href="../index.html">Back</a>

    
<div class="configurator">
    <div class="header">Configurator</div>
    <div class="box-col">
        <h4>Get Value</h4>
        <ul class="options">
            <li>
                <button id="get">Get value</button>
            </li>
            <li>
                <button id="focus">Focus</button>
            </li>
        </ul>
    </div>
    <div class="box-col">
        <h4>Set Value</h4>
        <ul class="options">
            <li>
                <input id="value" value="Hello, how can I help you?" />
            </li>
            <li>
                <button id="set">Set value</button>
            </li>
        </ul>
    </div>
    <div class="box-col">
        <h4>Enable / Disable</h4>
        <ul class="options">
            <li>
                <button id="enable">Enable</button>
                <button id="disable">Disable</button>
            </li>
            <li>
                <button id="readonly">Readonly</button>
            </li>
        </ul>
    </div>
</div>

<div class="k-d-flex k-justify-content-center">
    <div class="promptbox-container">
        <input id="promptbox" />
    </div>
</div>

<script>
    $(document).ready(function () {
        $("#promptbox").kendoPromptBox({
            placeholder: "Type a message...",
            mode: "auto"
        });

        var promptBox = $("#promptbox").data("kendoPromptBox");

        var setValue = function () {
            promptBox.value($("#value").data("kendoTextBox").value());
        };

        $("#enable").click(function () {
            promptBox.enable(true);
        });

        $("#disable").click(function () {
            promptBox.enable(false);
        });

        $("#readonly").click(function () {
            promptBox.readonly(true);
        });

        $("#focus").click(function () {
            promptBox.focus();
        });

        $("#value").kendoTextBox({
            change: setValue
        });

        $("#set").click(setValue);

        $("#get").click(function () {
            alert(promptBox.value());
        });
    });
</script>

<style>
    .promptbox-container {
        padding-bottom: 40px;
        padding-top: 160px;
        padding-left: 35px;
        padding-right: 35px;
        width: 540px;
        min-height: 244px;
        box-shadow: 0 0 12px 4px rgba(0, 0, 0, 0.08);
    }

    .demo-section {
        padding: 0 !important;
    }
</style>
</body>
</html>
