<!DOCTYPE html>
<html lang="en">
<head>
    <title>Adornments</title>
    <meta charset="utf-8">
    <link href="../content/shared/styles/examples-offline.css" rel="stylesheet">
    <link href="../../styles/default-ocean-blue.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://unpkg.com/jszip/dist/jszip.min.js"></script>
    <script src="../../js/kendo.all.min.js"></script>
    <script src="../content/shared/js/console.js"></script>
    
    
</head>
<body>
    <a class="offline-button" href="../index.html">Back</a>

    
<div class="k-d-flex k-justify-content-center" style="padding-top: 40px;">
    <div class="promptbox-container">
        <input id="promptbox" />
    </div>
</div>

<script>
    $(document).ready(function () {
        $("#promptbox").kendoPromptBox({
            placeholder: "Type a message...",
            mode: "multi",
            fileSelectButton: true,
            maxTextAreaHeight: 110,
            startAffixTemplate: function() {
                return `<span style='margin-bottom: 2px;' onclick='alert("Undo the previous message.")'>` + kendo.ui.icon({ icon: 'arrow-rotate-ccw' }) + `</span>`;
            },
            endAffixTemplate: function() {
                return `<span style='margin-bottom: 2px;' onclick='alert("Ask MCP server.")'>` + kendo.ui.icon({ icon: 'sparkles' }) + `</span>`;
            }
        });
    });
</script>

<style>
    .k-prompt-box-affix .k-svg-icon {
        cursor: pointer;
    }

    .promptbox-container {
        padding-bottom: 40px;
        padding-top: 125px;
        padding-left: 35px;
        padding-right: 35px;
        width: 540px;
        min-height: 244px;
        box-shadow: 0 0 12px 4px rgba(0, 0, 0, 0.08);
    }
</style>

</body>
</html>
