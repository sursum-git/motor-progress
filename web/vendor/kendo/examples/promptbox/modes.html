<!DOCTYPE html>
<html lang="en">
<head>
    <title>Modes</title>
    <meta charset="utf-8">
    <link href="../content/shared/styles/examples-offline.css" rel="stylesheet">
    <link href="../../styles/default-ocean-blue.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://unpkg.com/jszip/dist/jszip.min.js"></script>
    <script src="../../js/kendo.all.min.js"></script>
    <script src="../content/shared/js/console.js"></script>
    
    
</head>
<body>
    <a class="offline-button" href="../index.html">Back</a>

    
<div class="configurator" style="display: flex; flex-direction: column; align-items: center;">
    <div style="margin: 30px -12px 15px -30px; width: 100%;">
        <div class="example-config"
             style="display: flex; justify-content: center; align-items: center; gap: 10px; padding: 10px;">
            <span style="font-weight: bold;">Mode:</span>
            <div id="modeOptions"></div>
        </div>
    </div>
</div>

<div class="k-d-flex k-justify-content-center">
    <div class="promptbox-container">
        <!-- Target element for PromptBox -->
        <input id="promptbox" />
    </div>
</div>

<script>
    $(document).ready(function () {
        // Initialize Configurator RadioGroup
        $("#modeOptions").kendoRadioGroup({
            items: [
                { value: 'single', label: 'Single' },
                { value: 'multi', label: 'Multi' },
                { value: 'auto', label: 'Auto' }
            ],
            layout: "horizontal",
            value: "single",
            change: function (e) {
                var promptBox = $("#promptbox").data("kendoPromptBox");
                // Dynamically update the mode
                promptBox.value("");
                promptBox.setOptions({
                    mode: e.newValue,
                });
            }
        });

        // Initialize PromptBox Widget
        $("#promptbox").kendoPromptBox({
            placeholder: "Type a message",
            mode: "single",
            fileSelectButton: true,
            maxTextAreaHeight: 110,
            startAffixTemplate: function() {
                return "<span style='margin-bottom: 2px; scale: 1.3;'>"+kendo.ui.icon({ icon: 'globe-outline' })+"</span>";
            }
        });
    });
</script>

<style>
    .promptbox-container {
        padding-bottom: 40px;
        padding-top: 150px;
        padding-left: 35px;
        padding-right: 35px;
        width: 540px;
        min-height: 244px;
        box-shadow: 0 0 12px 4px rgba(0, 0, 0, 0.08);
    }
</style>
</body>
</html>
