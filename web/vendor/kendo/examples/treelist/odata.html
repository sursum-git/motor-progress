<!DOCTYPE html>
<html lang="en">
<head>
    <title>Binding to OData-v4 service</title>
    <meta charset="utf-8">
    <link href="../content/shared/styles/examples-offline.css" rel="stylesheet">
    <link href="../../styles/default-ocean-blue.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://unpkg.com/jszip/dist/jszip.min.js"></script>
    <script src="../../js/kendo.all.min.js"></script>
    <script src="../content/shared/js/console.js"></script>
    
    
</head>
<body>
    <a class="offline-button" href="../index.html">Back</a>

    
<div id="example">
    <div id="treelist"></div>
    <script>
        $(document).ready(function () {

            $("#treelist").kendoTreeList({
                dataSource: {
                    type: "odata-v4",
                    transport: {
                        read: {
                            url: function (item) {
                                if (item.hasOwnProperty("id")) {
                                    return "https://demos.telerik.com/service/v2/odata/EmployeeSubordinates(" + item.id + ")";
                                } else {
                                    return "https://demos.telerik.com/service/v2/odata/TopEmployees";
                                }
                            }
                        }
                    },
                    schema: {
                        model: {
                            id: "EmployeeID",
                            parentId: "ReportsTo",
                            fields: {
                                ReportsTo: { field: "ReportsTo", nullable: true },
                                EmployeeID: { field: "EmployeeID", type: "number" }
                            }
                        }
                    }
                },
                filterable: true,
                sortable: true,
                columns: [
                    { field: "FirstName", title: "First Name", width: 280 },
                    { field: "LastName", title: "Last Name", width: 160 },
                    { field: "HomePhone", width: 200 },
                    { field: "Extension", width: 140 },
                    { field: "Address" }
                ]
            });
        });
    </script>
</div>

</body>
</html>
