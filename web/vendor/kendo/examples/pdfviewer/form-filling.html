<!DOCTYPE html>
<html lang="en">
<head>
    <title>Form Filling</title>
    <meta charset="utf-8">
    <link href="../content/shared/styles/examples-offline.css" rel="stylesheet">
    <link href="../../styles/default-ocean-blue.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://unpkg.com/jszip/dist/jszip.min.js"></script>
    <script src="../../js/kendo.all.min.js"></script>
    <script src="../content/shared/js/console.js"></script>
    
    
</head>
<body>
    <a class="offline-button" href="../index.html">Back</a>

    
 <div id="pdfViewer">
</div> 
<script type="module">
    $("#pdfViewer").kendoPDFViewer({
        toolbar:{
            contextMenu: true
        },
        pdfjsProcessing: {
            renderForms:true,
            file: "../content/web/pdfViewer/form-filling.pdf"
        },
        scale:0.75,
        width: "100%",
        height: 1200
    });
</script>

<style>
    html body #pdfviewer {
        width: 100% !important;
    }
    .k-annotation-layer .k-text-widget-annotation .k-annotation-content {
        position: absolute;
        width: 100%;
        height: 100%;
        pointer-events: none;
    }
    .k-annotation-layer {
        --annotation-unfocused-field-background: url(data:image/svg+xml;charset=UTF-8,<svg width='1px' height='1px' xmlns='http://www.w3.org/2000/svg'><rect width='100%' height='100%' style='fill:rgba(0, 54, 255, 0.13);'/></svg>);
        --input-focus-border-color: black;
        --input-focus-outline: 1px solid Canvas;
        --input-unfocused-border-color: transparent;
        --input-disabled-border-color: transparent;
        --input-hover-border-color: black;
        --link-outline: none;
    }
        .k-annotation-layer .k-text-widget-annotation > input, .k-annotation-layer .k-text-widget-annotation > textarea, .k-annotation-layer .choiceWidgetAnnotation > select, .k-annotation-layer .k-button-widget-annotation:is(.k-checkbox-widget-annotation, .k-radio-button-widget-annotation) input {
            height: 100%;
            width: 100%;
        }
    .k-annotation-content {
        position: absolute;
        width: 100%;
        height: 100%;
        pointer-events: none;
    }
    .k-annotation-layer:is(.k-link-annotation, .k-button-widget-annotation.k-push-button-widget-annotation) > a {
        position: absolute;
        font-size: 1em;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
    }
    .k-annotation-layer:is(.k-link-annotation, .k-button-widget-annotation.k-push-button-widget-annotation):not(.hasBorder) > a:hover {
        opacity: 0.2;
        background-color: rgb(255 255 0);
        box-shadow: 0 2px 10px rgb(255 255 0);
    }
    section.k-radio-button-widget-annotation > input[type="radio"] {
        margin-left: 1px;
        margin-top: 0px;
    }
    section.k-text-widget-annotation > input[type="text"] {
        border: none;
    }
</style>
</body>
</html>
