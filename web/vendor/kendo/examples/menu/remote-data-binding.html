<!DOCTYPE html>
<html lang="en">
<head>
    <title>Binding to Remote Data</title>
    <meta charset="utf-8">
    <link href="../content/shared/styles/examples-offline.css" rel="stylesheet">
    <link href="../../styles/default-ocean-blue.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://unpkg.com/jszip/dist/jszip.min.js"></script>
    <script src="../../js/kendo.all.min.js"></script>
    <script src="../content/shared/js/console.js"></script>
    
    
</head>
<body>
    <a class="offline-button" href="../index.html">Back</a>

    

    <div id="example">
        <div class="demo-section wide">
            <ul id="myMenu">
            </ul>
        </div>

        <script>
            var Products = {
                type: "odata-v4",
                schema: {
                    model: {
                        id: "ProductID",
                        fields: {
                            Name: {
                                from: "ProductName"
                            },
                        }
                    }
                },
                transport: {
                    read: {
                        url: function (options) {
                            return kendo.format("https://demos.telerik.com/service/v2/odata/Categories({0})/Products", options.CategoryID);
                        }
                    }
                }
            };

            var Categories = new kendo.data.HierarchicalDataSource({
                type: "odata-v4",
                transport: {
                    read: {
                    url: "https://demos.telerik.com/service/v2/odata/Categories?$expand=Products"
                    }
                },
                schema: {
                    model: {
                        hasChildren: "Products",
                        id: "CategoryID",
                        children: Products,
                        fields: {
                            Name: {
                                from: "CategoryName"
                            }
                        }
                    }
                }
            });

            $(document).ready(function() {
                $("#myMenu").kendoMenu({
                    dataTextField: "Name",
                    dataSource: Categories
                });
            });
        </script>
    </div>

</body>
</html>
