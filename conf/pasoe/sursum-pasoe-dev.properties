# Configuracao local proposta para validar worker/REST no PASOE.
# Esta configuracao documenta os parametros que devem ser aplicados na instancia sursum-pasoe-dev.

instance.name=sursum-pasoe-dev
instance.purpose=validacao-local-fila-async

database.args=-db D:\opencode\motor-progress\db\sports2000 -1 -ld DICTDB -db D:\opencode\motor-progress\db\ems2med -1 -ld ems2med

propath.1=D:\opencode\motor-progress\sursum
propath.2=D:\opencode\motor-progress\rest
propath.3=D:\opencode\motor-progress\workers
propath.4=D:\opencode\motor-progress\sursum\esp
propath.5=D:\opencode\motor-progress
propath.6=${DLC}\tty\netlib\OpenEdge.Net.pl

output.dir=D:\opencode\motor-progress\output\jobs
worker.mode=PASOE
worker.name=pasoe-worker
worker.batchSize=10

rest.endpoint.dynamicQuery=POST /web/SursumDynamicQuery/query
rest.endpoint.jobStatus=GET /web/SursumDynamicQuery/jobs/{jobId}
rest.endpoint.jobResult=GET /web/SursumDynamicQuery/jobs/{jobId}/result
rest.endpoint.drain=POST /web/SursumDynamicQuery/jobs/drain

